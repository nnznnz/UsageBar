name: CI

# Build and test on a real macOS runner. For a tool whose author develops it
# elsewhere, this is the authoritative "does it actually compile and pass tests
# on macOS" check.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    # macos-15 ships Xcode 16 / Swift 6 by default, which the swift-tools-version:6.0
    # manifest needs. (Code still compiles in Swift 5 language mode — see Package.swift.)
    runs-on: macos-15
    steps:
      # Pinned to commit SHAs (not mutable tags) — same supply-chain rule as the
      # zero-dependency policy: nothing in the build path can change under us.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release -v

      - name: Test
        run: swift test -v

      # Produce a ready-to-run UsageBar.app so it can be downloaded and used
      # without a local Swift toolchain (build.sh: swift build -c release +
      # bundle + ad-hoc codesign).
      - name: Bundle .app
        run: ./build.sh

      - name: Upload UsageBar.app
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: UsageBar-app
          path: UsageBar.app
          if-no-files-found: error

      - name: Assert no third-party dependencies crept in
        run: |
          if [ -f Package.resolved ]; then
            echo "::error::Package.resolved exists — a dependency was added. This project must stay dependency-free."
            cat Package.resolved
            exit 1
          fi
          echo "OK: zero third-party dependencies."
